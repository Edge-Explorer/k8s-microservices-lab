# SERVICE 1: REDIS 
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379

---

# SERVICE 2: BACKEND
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort 
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 30000