apiVersion: v1
kind: Secret
metadata:
  name: microservices-secret
type: Opaque # "Opaque" is the standard type for general secrets
data:
# To get this string, search for "Base64 encode" online or run: 
# echo -n "mypassword" | base64
  REDIS_PASSWORD: bXlwYXNzd29yZA== # This is "mypassword" in disguise!