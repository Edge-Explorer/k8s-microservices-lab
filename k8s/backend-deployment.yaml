apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: karan6124/backend:v1
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
           name: microservices-config